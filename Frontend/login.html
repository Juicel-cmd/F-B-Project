<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickBite — Login</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:5000 http://127.0.0.1:5500 http://127.0.0.1:5000 http://localhost:3000 ws://127.0.0.1:5500 ws://localhost:5500; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --red:#DA1B1B;
      --red-dark:#B01515;
      --red-light:#FF3B3B;
      --yellow:#FFC107;
      --bg:#1A1A1A;
      --surface:#242424;
      --surface2:#2E2E2E;
      --surface3:#383838;
      --border:#3A3A3A;
      --text:#FFFFFF;
      --text-muted:#A0A0A0;
      --green:#2ECC71;
      --radius:14px;
      --radius-sm:8px;
    }
    html,body{
      height:100%;
      font-family:'Barlow',sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    body{
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    /* TOP BAR */
    .topbar{
      background:var(--red);
      height:70px;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 2rem;
      flex-shrink:0;
      position:relative;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
    }
    .topbar::after{
      content:'';position:absolute;bottom:0;left:0;right:0;
      height:3px;background:var(--yellow);
    }
    .brand{display:flex;align-items:center;gap:12px;}
    .brand-logo{
      width:44px;height:44px;border-radius:50%;
      background:var(--yellow);
      display:flex;align-items:center;justify-content:center;
      font-size:1.6rem;font-weight:900;color:var(--red-dark);
      font-family:'Barlow Condensed',sans-serif;
      box-shadow:0 2px 12px rgba(0,0,0,0.3);
    }
    .brand-name{
      font-family:'Barlow Condensed',sans-serif;
      font-size:2rem;font-weight:900;
      color:#fff;letter-spacing:0.04em;
      text-transform:uppercase;
    }
    .brand-name span{color:var(--yellow);}

    /* MAIN */
    .page{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:2rem;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(218,27,27,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(255,193,7,0.05) 0%, transparent 60%),
        var(--bg);
    }

    /* CARD */
    .card{
      background:var(--surface);
      border:1.5px solid var(--border);
      border-radius:calc(var(--radius)*1.5);
      width:100%;max-width:420px;
      overflow:hidden;
      box-shadow:0 24px 80px rgba(0,0,0,0.6);
    }
    .card-top{
      background:var(--red);
      padding:28px 24px 24px;
      text-align:center;
      position:relative;
    }
    .card-top::after{
      content:'';position:absolute;bottom:0;left:0;right:0;
      height:3px;background:var(--yellow);
    }
    .card-logo{
      width:60px;height:60px;border-radius:50%;
      background:var(--yellow);
      display:flex;align-items:center;justify-content:center;
      font-size:2rem;font-weight:900;color:var(--red-dark);
      font-family:'Barlow Condensed',sans-serif;
      margin:0 auto 12px;
      box-shadow:0 4px 16px rgba(0,0,0,0.3);
    }
    .card-title{
      font-family:'Barlow Condensed',sans-serif;
      font-size:2rem;font-weight:900;
      color:#fff;text-transform:uppercase;
      letter-spacing:0.06em;
    }
    .card-title span{color:var(--yellow);}
    .card-subtitle{
      font-size:0.85rem;
      color:rgba(255,255,255,0.7);
      margin-top:4px;
    }

    /* TABS */
    .tabs{
      display:flex;
      border-bottom:1px solid var(--border);
      background:var(--surface2);
    }
    .tab{
      flex:1;padding:14px;
      text-align:center;cursor:pointer;
      font-family:'Barlow Condensed',sans-serif;
      font-size:1.1rem;font-weight:700;
      color:var(--text-muted);
      text-transform:uppercase;letter-spacing:0.06em;
      border-bottom:3px solid transparent;
      transition:all 0.2s;
    }
    .tab:hover{color:#fff;background:var(--surface3);}
    .tab.active{
      color:var(--yellow);
      border-bottom-color:var(--yellow);
      background:var(--surface);
    }

    /* FORM BODY */
    .card-body{padding:24px;}
    .form-group{display:flex;flex-direction:column;gap:12px;}

    .input-wrap{position:relative;}
    .input-wrap input{
      width:100%;
      padding:14px 16px;
      background:var(--surface2);
      border:1.5px solid var(--border);
      border-radius:var(--radius-sm);
      color:#fff;
      font-family:'Barlow',sans-serif;
      font-size:0.95rem;
      transition:border-color 0.2s,box-shadow 0.2s;
      outline:none;
    }
    .input-wrap input::placeholder{color:var(--text-muted);}
    .input-wrap input:focus{
      border-color:var(--yellow);
      box-shadow:0 0 0 3px rgba(255,193,7,0.12);
    }

    .btn-submit{
      width:100%;margin-top:4px;
      background:var(--yellow);color:#1A1A1A;
      border:none;border-radius:var(--radius);
      padding:16px;
      font-family:'Barlow Condensed',sans-serif;
      font-size:1.3rem;font-weight:900;
      letter-spacing:0.06em;text-transform:uppercase;
      cursor:pointer;
      box-shadow:0 4px 16px rgba(255,193,7,0.35);
      transition:transform 0.15s,box-shadow 0.2s,background 0.15s;
    }
    .btn-submit:hover{background:#FFD740;box-shadow:0 6px 24px rgba(255,193,7,0.5);}
    .btn-submit:active{transform:scale(0.97);}

    .message{
      text-align:center;
      margin-top:12px;
      font-size:0.85rem;
      font-weight:600;
      color:var(--red-light);
      min-height:20px;
    }
    .message.success{color:var(--green);}

    .hidden{display:none;}

    /* BOTTOM STRIP */
    .card-strip{
      height:8px;
      background:repeating-linear-gradient(
        90deg,var(--red) 0,var(--red) 20px,var(--yellow) 20px,var(--yellow) 40px
      );
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-logo">QB</div>
      <div class="brand-name">Quick<span>Bite</span></div>
    </div>
  </div>

  <!-- PAGE -->
  <div class="page">
    <div class="card">

      <!-- CARD TOP -->
      <div class="card-top">
        <div class="card-logo">QB</div>
        <div class="card-title">Quick<span>Bite</span></div>
        <div class="card-subtitle">Sign in to book your table</div>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <div class="tab active" id="loginTab" onclick="switchTab('login')">Login</div>
        <div class="tab" id="registerTab" onclick="switchTab('register')">Register</div>
      </div>

      <!-- CARD BODY -->
      <div class="card-body">

        <!-- LOGIN FORM -->
        <div id="loginForm">
          <div class="form-group">
            <div class="input-wrap">
              <input type="email" id="loginEmail" placeholder="Email address" />
            </div>
            <div class="input-wrap">
              <input type="password" id="loginPassword" placeholder="Password" />
            </div>
            <button class="btn-submit" onclick="login()">Login →</button>
          </div>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="hidden">
          <div class="form-group">
            <div class="input-wrap">
              <input type="text" id="regUsername" placeholder="Username" />
            </div>
            <div class="input-wrap">
              <input type="email" id="regEmail" placeholder="Email address" />
            </div>
            <div class="input-wrap">
              <input type="password" id="regPassword" placeholder="Password" />
            </div>
            <button class="btn-submit" onclick="register()">Create Account →</button>
          </div>
        </div>

        <p class="message" id="message"></p>

      </div>

      <!-- BOTTOM STRIP -->
      <div class="card-strip"></div>

    </div>
  </div>

 <script>
    // Tab switching layout functionality
    function switchTab(tab){
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('registerTab').classList.toggle('active', tab === 'register');
      clearMessage();
    }

    // Helper functions to manage display feedback messages
    function displayMessage(text, isSuccess = false) {
      const msgEl = document.getElementById('message');
      msgEl.innerText = text;
      if (isSuccess) {
        msgEl.classList.add('success');
      } else {
        msgEl.classList.remove('success');
      }
    }

    function clearMessage() {
      document.getElementById('message').innerText = '';
    }

    // LOGIN PROCESS
    async function login() {
      clearMessage();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        displayMessage("Please fill in all login fields.");
        return;
      }

      try {
        // Pointing to your backend port 5000 instead of 3000
        const response = await fetch('http://localhost:5000/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          displayMessage(data.message || "Invalid credentials.");
          return;
        }

        displayMessage("Login successful! Redirecting...", true);
        
        // Save access tokens or session details if your backend sends them
        if (data.token) {
          localStorage.setItem('token', data.token);
        }

        // Redirect user to homepage or booking view after 1.5 seconds
        setTimeout(() => {
          window.location.href = '/index.html'; 
        }, 1500);

      } catch (error) {
        console.error("Login Error:", error);
        displayMessage("Connection failed. Ensure backend server is running on port 5000.");
      }
    }

    // REGISTRATION PROCESS
    async function register() {
      clearMessage();
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;

      if (!username || !email || !password) {
        displayMessage("Please complete all registration fields.");
        return;
      }

      try {
        // Pointing to your backend port 5000 instead of 3000
        const response = await fetch('http://localhost:5000/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          displayMessage(data.message || "Registration failed.");
          return;
        }

        displayMessage("Account created successfully! Switching to login...", true);
        
        // Automatically pivot to login view so they can sign in
        setTimeout(() => {
          switchTab('login');
          document.getElementById('loginEmail').value = email;
        }, 2000);

      } catch (error) {
        console.error("Registration Error:", error);
        displayMessage("Connection failed. Ensure backend server is running on port 5000.");
      }
    }
  </script>

</body>
</html>
